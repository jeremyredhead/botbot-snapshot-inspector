<!DOCTYPE html>
<meta charset=utf8>
<title>BotBot snapshots inspector (WIP)</title>
<style>table {border-collapse: collapse} th, td {border: 1px solid; padding: .2em}</style>

<label>select BotBot snapshot file(s):<br>
<input type=file id=FILES multiple accept='.json, application/json' style='border-radius: 5px; border: 1px solid black; padding: 1em' ondragover='this.style.borderStyle = "dashed"' ondragleave='this.style.borderStyle = "solid"' ondrop='this.style.borderStyle = "solid"'>
</label>
<button type=button onclick="FILES.dispatchEvent(new Event('change'))">Reload Files</button>
<output id=ERRORS style="color: #e00; font-weight: bold; display: block;">
</output>
<table id=TABLE>
<thead>
	<tr>
		<th>Nickname</th>
		<th>Room</th>
		<th>Creator</th>
		<th>Paused? and PauseText</th>
		<th>UUID</th>
		<th>Initialized?</th>
		<th>~Hatched</th>
		<th>Variables</th>
		<th>Code</th>
	</tr>
</thead>
<tbody id=ROWS>
</tbody>
</table>

<script>
'use strict'
const BOTS = []

const logError = (label, fileName, error) => {
	console.error(label, `file "${fileName}":`, error)
	ERRORS.innerHTML += `${label} file "${fileName}": ${e}<br/>`
}

async function reloadBotArray(fileList, botArray) {
	botArray.length = 0
	ERRORS.innerHTML = ''
	for (const file of fileList) {
		if (file == null) continue
		try {
			botArray.push(JSON.parse(await file.text()))
		} catch(e) {
			if (e instanceof SyntaxError) {
				logError('Error parsing', file.name, e)
			}
			else if (e instanceof DOMException && e.name == 'AbortError') {
				// assume this is due to the file having been deleted
				// -- there seems to be no proper or even good way to check this
				// see <https://stackoverflow.com/q/46029416>

				// we can't delete a File from a FileList, so just log to console
				console.debug(`File "${file.name}" seems to have been deleted:`, file)
			} else {
				logError('Unknown error', file.name, e)
			}
		}
	}
	return botArray
}

// tricks stolen from <https://stackoverflow.com/a/37129036> and <https://stackoverflow.com/a/31638198>
// FIXME: actually escape shit properly contextually so it doesn't break if held wrong
const html = (strings, ...values) => strings.flatMap((s, i) => [s, String(i in values ? values[i] : '').replace(/[&<>'"]/g, c => `&#${c.charCodeAt(0)};`)]).slice(0, -1).join('')

async function refreshBotTable(botArray) {
	ROWS.innerHTML = ''
	for (const bot of botArray) {
		const userVariables = Object.fromEntries(
			Object.entries(bot.variables)
			.filter(([key]) => !!! [
				'creator',
				'atcreator',
				'@creator',
				'self',
				'atself',
				'@self',
				'sender',
				'atsender',
				'@sender',
				'uptime',
				'uptimeutc',
				'groups',
				'room',
				'uuid',
			].includes(key))
		)
		const code = bot.code.trim()
		ROWS.innerHTML += html`<tr>
			<td>${bot.nickname}</td>
			<td>&amp;${bot.room}</td>
			<td>@${bot.creator}</td>
			<td>${bot.paused} (${bot.pauseText})</td>
			<td><code>${bot.uuid}</code></td>
			<td>${bot.initialized}</td>
			<td>${bot.variables.uptimeutc}</td>
			<td><code style=white-space:pre-line>${JSON.stringify(userVariables, null, 1).slice(1, -1).trim()}</code></td>
			<td>
				<details ${code.length < 110 ? 'open' : ''}>
					<summary>Code (${`${code}\n`.match(/\n/g).length} lines, ${code.length} characters)</summary>
					<pre>${code}</pre>
				</details>
			</td>
		</tr>`
	}
}

FILES.addEventListener('change', e => {
	reloadBotArray(FILES.files, BOTS)
	.then(botArray => refreshBotTable(botArray))
})
</script>
